# monitoring/prometheus/alert_rules.yml
# Northbridge Commerce — YOUR TASK: Write the Prometheus alert rules.
#
# You must write alert rules covering FIVE categories.
# Each category must have at least one working, tested rule:
#
#   1. HOST RESOURCES
#      - HighCPUUsage       — node_cpu_seconds_total, threshold >85%, for 5m
#      - HighMemoryUsage    — node_memory_MemAvailable_bytes, threshold >85%, for 5m
#      - LowDiskSpace       — node_filesystem_avail_bytes, threshold <15%, for 10m
#
#   2. CONTAINER HEALTH
#      - ContainerDown      — up == 0, for 1m
#      - ContainerHighMemory — container_memory_usage_bytes vs limit, threshold >90%, for 5m
#
#   3. DATABASE
#      - PostgreSQLDown           — pg_up == 0, for 1m
#      - PostgreSQLHighConnections — pg_stat_activity_count / pg_settings_max_connections, >80%, for 5m
#
#   4. REDIS
#      - RedisDown         — redis_up == 0, for 1m
#      - RedisHighMemory   — redis_memory_used_bytes / redis_memory_max_bytes, >90%, for 5m
#      - RedisLowCacheHitRate — catalog_cache_hits_total vs misses, <50% for 15m
#
#   5. APPLICATION
#      - HighErrorRate     — http_request_duration_seconds_count with status 5xx, >5%, for 3m
#      - HighRequestLatency — histogram_quantile(0.95, ...) > 1s, for 5m
#      - PaymentsHighDeclineRate — payments_processed_total by status, >20%, for 10m
#
# EACH RULE MUST HAVE:
#   - alert name
#   - expr (valid PromQL)
#   - for duration
#   - labels (severity: warning or critical)
#   - annotations (summary and description with $value templating)
#
# TEST YOUR RULES: After deploying, check Prometheus UI → Status → Rules
# to confirm all rules load without errors.
#
# TRIGGER TEST: You must deliberately fire at least 3 rules and confirm
# they reach Alertmanager and produce a Slack notification (Deliverable D8).
#
# REFERENCE: Solution guide Section 6.2.


  # TODO: write your alert rule groups here
groups:

  # ─── 1. Host Resources ────────────────────────────────────────────────────

  - name: host_resources
    rules:

      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% — above the 85% threshold for 5 minutes."

      - alert: HighMemoryUsage
        expr: |
          100 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% — above the 85% threshold for 5 minutes."

      - alert: LowDiskSpace
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) < 15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Only {{ $value | printf \"%.1f\" }}% disk space remaining — below 15% threshold for 10 minutes."

  # ─── 2. Container Health ──────────────────────────────────────────────────

  - name: container_health
    rules:

      - alert: ContainerDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.job }} is down"
          description: "Prometheus target {{ $labels.job }} ({{ $labels.instance }}) has been unreachable for 1 minute."

      - alert: ContainerHighMemory
        expr: |
          (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""}) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} memory usage above 90%"
          description: "Container {{ $labels.name }} is using {{ $value | printf \"%.1f\" }}% of its memory limit for 5 minutes."

  # ─── 3. Database ──────────────────────────────────────────────────────────

  - name: database
    rules:

      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter reports the database is unreachable — has been down for 1 minute."

      - alert: PostgreSQLHighConnections
        expr: |
          (pg_stat_activity_count / pg_settings_max_connections) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool above 80%"
          description: "PostgreSQL is using {{ $value | printf \"%.1f\" }}% of max_connections — above 80% threshold for 5 minutes. This was the cause of incident #1."

  # ─── 4. Redis ─────────────────────────────────────────────────────────────

  - name: redis
    rules:

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis exporter reports the cache is unreachable — has been down for 1 minute. Auth and catalog services will fall back to direct PostgreSQL reads."

      - alert: RedisHighMemory
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 90%"
          description: "Redis is using {{ $value | printf \"%.1f\" }}% of its maxmemory limit — evictions may increase and cache hit rate may drop."

      - alert: RedisLowCacheHitRate
        expr: |
          rate(catalog_cache_hits_total[15m]) /
          (rate(catalog_cache_hits_total[15m]) + rate(catalog_cache_misses_total[15m])) * 100 < 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Catalog cache hit rate below 50%"
          description: "Cache hit rate is {{ $value | printf \"%.1f\" }}% over the last 15 minutes — catalog reads are falling through to PostgreSQL more than expected."

  # ─── 5. Application ───────────────────────────────────────────────────────

  - name: application
    rules:

      - alert: HighErrorRate
        expr: |
          sum by(job) (rate(http_request_duration_seconds_count{status_code=~"5.."}[3m]))
          /
          sum by(job) (rate(http_request_duration_seconds_count[3m])) * 100 > 5
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} is returning {{ $value | printf \"%.1f\" }}% 5xx errors — above 5% threshold for 3 minutes."

      - alert: HighRequestLatency
        expr: |
          histogram_quantile(0.95,
            sum by(job, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "p95 response time on {{ $labels.job }} is {{ $value | printf \"%.2f\" }}s — above 1s threshold for 5 minutes."

      - alert: PaymentsHighDeclineRate
        expr: |
          rate(payments_processed_total{status="declined"}[10m])
          /
          rate(payments_processed_total[10m]) * 100 > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High payment decline rate"
          description: "{{ $value | printf \"%.1f\" }}% of payments are being declined — above 20% threshold for 10 minutes. May indicate a card processor issue or fraud spike."