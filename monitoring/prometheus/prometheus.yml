# monitoring/prometheus/prometheus.yml
# Northbridge Commerce — YOUR TASK: Write the Prometheus scrape configuration.
#
# You need to configure:
#
#   global:
#     scrape_interval: 15s
#     evaluation_interval: 15s
#
#   rule_files:
#     - "alert_rules.yml"
#
#   alerting:
#     alertmanagers pointing to alertmanager:9093
#
#   scrape_configs — one job per target:
#     - prometheus        (localhost:9090)
#     - node-exporter     (node-exporter:9100)
#     - cadvisor          (cadvisor:8080)
#     - postgres-exporter (postgres-exporter:9187)
#     - redis-exporter    (redis-exporter:9121)
#     - traefik           (traefik:8080)
#
#     Application services — each exposes /metrics:
#     - auth-service          (auth-service:8000)
#     - catalog-service       (catalog-service:4000)
#     - orders-service        (orders-service:8001)
#     - payments-service      (payments-service:4001)
#     - inventory-service     (inventory-service:8002)
#     - notifications-service (notifications-service:4002)
#     - analytics-service     (analytics-service:8003)
#
# NOTE: All targets use container names on the northbridge-net network —
# Prometheus runs inside Docker and reaches them by service name, not localhost.
#
# REFERENCE: Solution guide Section 6.

# TODO: write the Prometheus scrape configuration here

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  # ─── Prometheus itself ────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ─── Infrastructure exporters ─────────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']

  # ─── Traefik ──────────────────────────────────────────────────────────────
  - job_name: traefik
    static_configs:
      - targets: ['traefik:8080']

  # ─── Application services ─────────────────────────────────────────────────
  - job_name: auth-service
    static_configs:
      - targets: ['auth-service:8000']

  - job_name: catalog-service
    static_configs:
      - targets: ['catalog-service:4000']

  - job_name: orders-service
    static_configs:
      - targets: ['orders-service:8001']

  - job_name: payments-service
    static_configs:
      - targets: ['payments-service:4001']

  - job_name: inventory-service
    static_configs:
      - targets: ['inventory-service:8002']

  - job_name: notifications-service
    static_configs:
      - targets: ['notifications-service:4002']

  - job_name: analytics-service
    static_configs:
      - targets: ['analytics-service:8003']