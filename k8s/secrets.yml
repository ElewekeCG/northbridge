# k8s/secrets/secrets.yaml
# DO NOT commit with real values — this is a template.
# Apply with: kubectl apply -f k8s/secrets/secrets.yaml
# Or use: kubectl create secret generic northbridge-secrets \
#   --from-env-file=.env -n northbridge
#
# All values must be base64 encoded:
#   echo -n "your-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: northbridge-secrets
  namespace: northbridge
type: Opaque
data:
  POSTGRES_PASSWORD: <base64-encoded>
  AUTH_SECRET_KEY: <base64-encoded>
  STRIPE_SECRET_KEY: <base64-encoded>
  JWT_SECRET: <base64-encoded>
  DATABASE_URL: <base64-encoded>