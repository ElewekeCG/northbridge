# inventory-service
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: northbridge
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: northbridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: ${ECR_REGISTRY}/northbridge-inventory-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: northbridge-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: redis://redis:6379/2
          resources:
            requests:
              memory: 96Mi
              cpu: 100m
            limits:
              memory: 192Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 30
---
