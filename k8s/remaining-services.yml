# orders-service
apiVersion: v1
kind: Service
metadata:
  name: orders-service
  namespace: northbridge
spec:
  selector:
    app: orders-service
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service
  namespace: northbridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
        - name: orders-service
          image: ${ECR_REGISTRY}/northbridge-orders-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: northbridge-secrets
                  key: DATABASE_URL
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8000
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:4000
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:8002
            - name: PAYMENTS_SERVICE_URL
              value: http://payments-service:4001
            - name: NOTIFICATIONS_SERVICE_URL
              value: http://notifications-service:4002
          resources:
            requests:
              memory: 128Mi
              cpu: 150m
            limits:
              memory: 256Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
