# .github/workflows/deploy.yml
# Northbridge Commerce — YOUR TASK: Write the CD pipeline.
#
# This workflow runs ONLY on push to main.
# It builds all 8 images, pushes to ECR, then SSHes into EC2 to deploy.
#
# REQUIRED GITHUB SECRETS (set these in your repo Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION
#   ECR_REGISTRY          (e.g. 123456789012.dkr.ecr.eu-west-2.amazonaws.com)
#   EC2_HOST
#   EC2_USER              (ubuntu)
#   EC2_SSH_KEY           (full contents of the .pem private key file)
#   POSTGRES_PASSWORD
#   REDIS_PASSWORD
#   JWT_SECRET
#   TRAEFIK_DASHBOARD_AUTH
#   GRAFANA_ADMIN_PASSWORD
#   SLACK_WEBHOOK_URL
#   BACKUP_S3_BUCKET
#
# JOB 1 — build-and-push:
#   - Matrix over all 8 services
#   - Configure AWS credentials using the secrets above
#   - Log in to ECR
#   - docker build with TWO tags: the git SHA and :latest
#   - docker push both tags
#
# JOB 2 — deploy (runs after build-and-push):
#   - SSH into EC2 using appleboy/ssh-action
#   - Write ALL secrets to .env on the EC2 instance from the workflow's
#     environment variables — never hardcode values, never commit .env
#   - chmod 600 .env
#   - ECR login on the EC2 instance
#   - docker compose pull
#   - docker compose up -d --remove-orphans
#   - Health check sweep — curl each service's /healthz endpoint
#
# SECURITY REQUIREMENT:
#   The .env file must be written on the EC2 instance from GitHub Secrets,
#   NOT checked into the repository. This directly addresses the Northbridge
#   incident where a .env file was committed to source control.
#
# REFERENCE: Solution guide Section 8.
 
name: CD Build, Push to ECR, Deploy
 
on:
  push:
    branches: [main]
 
jobs:
 
  # ─── 1. Build and Push to ECR ─────────────────────────────────────────────
 
  build-and-push:
    name: Build and Push ${{ matrix.service }} to ECR
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - orders-service
          - inventory-service
          - analytics-service
          - catalog-service
          - payments-service
          - notifications-service
          - frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
 
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build and push ${{ matrix.service }}
        run: |
          docker build \
            --tag ${{ secrets.ECR_REGISTRY }}/northbridge-${{ matrix.service }}:${{ github.sha }} \
            --tag ${{ secrets.ECR_REGISTRY }}/northbridge-${{ matrix.service }}:latest \
            ./${{ matrix.service }}
          docker push ${{ secrets.ECR_REGISTRY }}/northbridge-${{ matrix.service }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/northbridge-${{ matrix.service }}:latest
 
  # ─── 2. Deploy to EC2 ─────────────────────────────────────────────────────
 
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Write .env file
        run: |
          printf 'POSTGRES_PASSWORD=%s\n' '${{ secrets.POSTGRES_PASSWORD }}' > .env
          printf 'REDIS_PASSWORD=%s\n' '${{ secrets.REDIS_PASSWORD }}' >> .env
          printf 'JWT_SECRET=%s\n' '${{ secrets.JWT_SECRET }}' >> .env
          printf 'AUTH_SECRET_KEY=%s\n' '${{ secrets.AUTH_SECRET_KEY }}' >> .env
          printf 'STRIPE_SECRET_KEY=%s\n' '${{ secrets.STRIPE_SECRET_KEY }}' >> .env
          printf 'TRAEFIK_DASHBOARD_AUTH=%s\n' '${{ secrets.TRAEFIK_DASHBOARD_AUTH }}' >> .env
          printf 'GRAFANA_ADMIN_PASSWORD=%s\n' '${{ secrets.GRAFANA_ADMIN_PASSWORD }}' >> .env
          printf 'SLACK_WEBHOOK_URL=%s\n' '${{ secrets.SLACK_WEBHOOK_URL }}' >> .env
          printf 'BACKUP_S3_BUCKET=%s\n' '${{ secrets.BACKUP_S3_BUCKET }}' >> .env
          printf 'AWS_REGION=%s\n' '${{ secrets.AWS_REGION }}' >> .env
          printf 'ECR_REGISTRY=%s\n' '${{ secrets.ECR_REGISTRY }}' >> .env
 
      - name: Copy .env to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".env"
          target: "/home/${{ secrets.EC2_USER }}/northbridge/"
 
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eo pipefail
            cd ~/northbridge
            git pull origin main
            chmod 600 .env
 
            # Log in to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
 
            # Pull latest images and redeploy
            docker compose pull
            docker compose up -d --remove-orphans
 
            # Wait for services to stabilise
            echo "Waiting 30s for services to stabilise..."
            sleep 30
 
            # Health check sweep
            FAILED=0
 
            check_health() {
              local service=$1
              local port=$2
              local runtime=$3
              echo "Checking health of $service..."
              if [ "$runtime" = "python" ]; then
                cmd="python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${port}/healthz')\""
              else
                cmd="wget -qO- http://localhost:${port}/healthz"
              fi
              if docker exec northbridge-${service}-1 sh -c "$cmd" > /dev/null 2>&1; then
                echo "$service: OK"
              else
                echo "$service: FAILED"
                FAILED=1
              fi
            }
 
            check_health auth-service 8000 python
            check_health orders-service 8001 python
            check_health inventory-service 8002 python
            check_health analytics-service 8003 python
            check_health catalog-service 4000 node
            check_health payments-service 4001 node
            check_health notifications-service 4002 node
 
            if [ "$FAILED" -eq 1 ]; then
              echo "One or more services failed health checks"
              exit 1
            fi

            echo "── Deploy complete ──"
            docker compose ps
 