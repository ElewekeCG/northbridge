# .github/workflows/ci.yml
# Northbridge Commerce — YOUR TASK: Write the CI pipeline.
#
# This workflow runs on every push to any branch and on pull requests to main.
# It must NOT push to ECR or deploy — that is deploy.yml (main branch only).
#
# JOBS REQUIRED:
#
#   1. test-python-services
#      - Matrix: auth-service, orders-service, inventory-service, analytics-service
#      - Python 3.11
#      - pip install -r requirements.txt
#
#   2. test-node-services
#      - Matrix: catalog-service, payments-service, notifications-service
#      - Node 20
#      - npm ci
#
#   3. build-images (runs after both test jobs pass)
#      - Matrix: all 8 services including frontend
#      - docker build -t northbridge-<service>:ci-test ./<service>
#      - This confirms every Dockerfile builds successfully without pushing
#
#   4. validate-compose
#      - cp .env.example .env
#      - docker compose config --quiet
#      - Confirms the docker-compose.yml you wrote is syntactically valid
#
# REFERENCE: Solution guide Section 8.

name: CI — Build and Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test-python-services:
    name: Test ${{ matrix.service }} (python 3.11)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - orders-service
          - inventory-service
          - analytics-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: pip install -r requirements.txt

  # -- 2. Test Node Services -----------

  test-node-services:
    name: Test ${{ matrix.service }} (Node 20)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - catalog-service
          - payments-service
          - notifications-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

  # -- 3. Build Docker Images -----------------

  build-images:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: [test-python-services, test-node-services]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - orders-service
          - inventory-service
          - analytics-service
          - catalog-service
          - payments-service
          - notifications-service
          - frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t northbridge-${{ matrix.service }}:ci-test ./${{ matrix.service }}

  # ---- 4. Validate Docker Compose -------------

  validate-compose:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Validate compose config
        run: docker compose config --quiet


