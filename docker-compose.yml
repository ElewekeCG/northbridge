services:

# traefik reverse proxy
  traefik:
    image: traefik:v3.0
    command: 
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@chickenkiller.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefikky.chickenkiller.com`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # infrastructure        

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=northbridge
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=northbridge_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northbridge -d northbridge_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 160M

  # app services
  auth-service:
    image: ${ECR_REGISTRY}/northbridge-auth-service:latest
    build:
      context: ./auth-service
    expose:
      - 8000
    environment:
      - DATABASE_URL=postgresql://northbridge:${POSTGRES_PASSWORD}@postgres:5432/northbridge_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${AUTH_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`shopn.chickenkiller.com`) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=letsencrypt"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
  catalog-service:
    image: ${ECR_REGISTRY}/northbridge-catalog-service:latest
    build:
      context: ./catalog-service
    expose:
      - "4000"
    environment:
      - DATABASE_URL=postgresql://northbridge:${POSTGRES_PASSWORD}@postgres:5432/northbridge_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    labels: 
      - "traefik.enable=true"
      - "traefik.http.routers.catalog.rule=Host(`shopn.chickenkiller.com`) && PathPrefix(`/api/catalog`)"
      - "traefik.http.routers.catalog.entrypoints=websecure"
      - "traefik.http.routers.catalog.tls.certresolver=letsencrypt"
      - "traefik.http.services.catalog.loadbalancer.server.port=4000"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
 
  inventory-service:
    image: ${ECR_REGISTRY}/northbridge-inventory-service:latest
    build:
      context: ./inventory-service
    expose:
      - "8002"
    environment:
      - DATABASE_URL=postgresql://northbridge:${POSTGRES_PASSWORD}@postgres:5432/northbridge_db
      - REDIS_URL=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inventory.rule=Host(`shopn.chickenkiller.com`) && PathPrefix(`/api/inventory`)"
      - "traefik.http.routers.inventory.entrypoints=websecure"
      - "traefik.http.routers.inventory.tls.certresolver=letsencrypt"
      - "traefik.http.services.inventory.loadbalancer.server.port=8002"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M

  payments-service:
    build:
      context: ./payments-service
    expose:
      - "4001"
    environment:
      - DATABASE_URL=postgresql://northbridge:${POSTGRES_PASSWORD}@postgres:5432/northbridge_db
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payments.rule=Host(`shopn.chickenkiller.com`) && PathPrefix(`/api/payments`)"
      - "traefik.http.routers.payments.entrypoints=websecure"
      - "traefik.http.routers.payments.tls.certresolver=letsencrypt"
      - "traefik.http.services.payments.loadbalancer.server.port=4001"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
 
  notifications-service:
    image: ${ECR_REGISTRY}/northbridge-notifications-service:latest
    build:
      context: ./notifications-service
    expose:
      - "4002"
    environment:
      - DATABASE_URL=postgresql://northbridge:${POSTGRES_PASSWORD}@postgres:5432/northbridge_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notifications.rule=Host(`shopn.chickenkiller.com`) && PathPrefix(`/api/notifications`)"
      - "traefik.http.routers.notifications.entrypoints=websecure"
      - "traefik.http.routers.notifications.tls.certresolver=letsencrypt"
      - "traefik.http.services.notifications.loadbalancer.server.port=4002"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
 
  orders-service:
    image: ${ECR_REGISTRY}/northbridge-orders-service:latest
    build:
      context: ./orders-service
    expose:
      - "8001"
    environment:
      - DATABASE_URL=postgresql://northbridge:${POSTGRES_PASSWORD}@postgres:5432/northbridge_db
      - AUTH_SERVICE_URL=http://auth-service:8000
      - CATALOG_SERVICE_URL=http://catalog-service:4000
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
      - PAYMENTS_SERVICE_URL=http://payments-service:4001
      - NOTIFICATIONS_SERVICE_URL=http://notifications-service:4002
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      payments-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orders.rule=Host(`shopn.chickenkiller.com`) && PathPrefix(`/api/orders`)"
      - "traefik.http.routers.orders.entrypoints=websecure"
      - "traefik.http.routers.orders.tls.certresolver=letsencrypt"
      - "traefik.http.services.orders.loadbalancer.server.port=8001"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
 
  analytics-service:
    image: ${ECR_REGISTRY}/northbridge-analytics-service:latest
    build:
      context: ./analytics-service
    expose:
      - "8003"
    environment:
      - DATABASE_URL=postgresql://northbridge:${POSTGRES_PASSWORD}@postgres:5432/northbridge_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/healthz')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.analytics.rule=Host(`shopn.chickenkiller.com`) && PathPrefix(`/api/analytics`)"
      - "traefik.http.routers.analytics.entrypoints=websecure"
      - "traefik.http.routers.analytics.tls.certresolver=letsencrypt"
      - "traefik.http.services.analytics.loadbalancer.server.port=8003"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
 
  frontend:
    image: ${ECR_REGISTRY}/northbridge-frontend:latest
    build:
      context: ./frontend
    expose:
      - "80"
    depends_on:
      orders-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`shopn.chickenkiller.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
 
# ─── Volumes & Networks ──────────────────────────────────────────────────────
 
volumes:
  postgres_data:
  letsencrypt:
 
networks:
  app-network:
    driver: bridge
 
